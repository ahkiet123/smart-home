<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartHome Dashboard & Authentication</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- bieu do -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      /* =========================================
           CSS CHO PHẦN AUTHENTICATION (Giữ nguyên của bạn)
           ========================================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Be Vietnam Pro", sans-serif;
      }

      #auth-view {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        transition: opacity 0.5s ease;
      }

      .auth-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        width: 100%;
        max-width: 420px;
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        position: relative;
        overflow: hidden;
      }

      .auth-form h2 {
        text-align: center;
        color: #2d3748;
        margin-bottom: 30px;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: -0.5px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #4a5568;
        font-size: 14px;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: #f4f7f6;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 14px;
        color: #2d3748;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        background: #ffffff;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
      }

      .form-group input::placeholder {
        color: #a0aec0;
      }

      .btn-auth {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        margin-top: 10px;
      }

      .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
      }

      .btn-auth:active {
        transform: translateY(1px);
      }

      .links {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        font-size: 14px;
      }

      .links a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        cursor: pointer;
        transition: color 0.3s;
      }

      .links a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      .text-center {
        justify-content: center;
        text-align: center;
      }

      p.subtitle {
        text-align: center;
        font-size: 14px;
        color: #718096;
        margin-bottom: 25px;
        line-height: 1.5;
      }

      .auth-form.active {
        display: block;
        animation: slideUpFade 0.5s ease forwards;
      }

      @keyframes slideUpFade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .otp-input {
        text-align: center;
        font-size: 24px !important;
        letter-spacing: 8px;
        font-weight: 600;
        padding: 15px !important;
      }

      /* =========================================
           CSS CHO DASHBOARD
           ========================================= */
      #dashboard-view {
        display: none;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      #dashboard-view.active {
        display: flex;
        opacity: 1;
      }

      /* Toggle Switch CSS */
      .toggle-checkbox:checked {
        right: 0;
        border-color: #68d391;
      }

      .toggle-checkbox:checked + .toggle-label {
        background-color: #3b82f6;
      }

      .toggle-checkbox:checked + .toggle-label .toggle-circle {
        transform: translateX(1.25rem);
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>

  <body class="bg-gray-50 text-slate-800 font-sans overflow-hidden">
    <div id="app"></div>

    <script src="/js/main.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/profile.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
